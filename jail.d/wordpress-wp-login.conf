# Fail2Ban jail for WordPress wp-login brute force protection
# Generic config for cPanel/WHM + CloudLinux + LiteSpeed
# Protects ALL WordPress sites (primary + addon domains) on the server

[wordpress-wp-login]
enabled = true
port = http,https
filter = wordpress-wp-login

# cPanel/LiteSpeed: monitors all domain access logs (primary + addon)
# Path covers: /usr/local/apache/domlogs/username/domain.com
# If logs are elsewhere, check: ls /usr/local/apache/domlogs/
logpath = /usr/local/apache/domlogs/*/*

# Ban after 5 wp-login requests within 5 minutes
maxretry = 5
findtime = 300
# Ban duration: 1 hour
bantime = 3600

# Uses default iptables action - works alongside CSF/BitNinja
