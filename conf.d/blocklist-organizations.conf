# Blocked organizations - IPs from these orgs/ISPs are ALWAYS banned, even from whitelisted countries
# Comma-separated, case-insensitive (matches org/isp from ip-api.com)
# Examples: Microsoft, DigitalOcean, Amazon, Oracle, OVH
# Leave empty to disable
BLOCKED_ORGANIZATIONS=

# Multi-domain abuse threshold - if IP from whitelisted country hits this many domains, ban anyway
# IPs hitting many domains in short time (e.g. 20.207.200.31 from IN affecting 8+ domains) are blocked
# Set to 0 to disable. Recommended: 3–5
MULTI_DOMAIN_ABUSE_THRESHOLD=3
