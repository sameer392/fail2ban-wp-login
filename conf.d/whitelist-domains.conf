# Domains and cPanel users to exclude from fail2ban protection
# These will NOT be monitored by wordpress-wp-login and apache-high-volume jails
#
# EXCLUDED_USERS - cPanel usernames (comma-separated). Their domains are excluded.
# EXCLUDED_DOMAINS - Domain names (comma-separated). Matches log filename (e.g. example.com, example.com-ssl_log)
#
# Leave empty to protect all domains.
# Example: EXCLUDED_USERS=user1,user2
# Example: EXCLUDED_DOMAINS=example.com,cdn.example.com

EXCLUDED_USERS=
EXCLUDED_DOMAINS=
